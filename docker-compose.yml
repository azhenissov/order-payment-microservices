services:
  order_db:
    image: postgres:15-alpine
    container_name: order_db
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_password
      POSTGRES_DB: orders_db
    ports:
      - "5434:5432"
    volumes:
      - order_data:/var/lib/postgresql/data
      - ./order-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d orders_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment_db:
    image: postgres:15-alpine
    container_name: payment_db
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_password
      POSTGRES_DB: payments_db
    ports:
      - "5433:5432"
    volumes:
      - payment_data:/var/lib/postgresql/data
      - ./payment-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payments_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
  payment-service:
    build:
      context: ./payment-service
    container_name: payment-service
    depends_on:
      payment_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 9090 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      PAYMENT_GRPC_PORT: :9090
      DATABASE_URL: "postgres://payment_user:payment_password@payment_db:5432/payments_db?sslmode=disable"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    ports:
      - "9090:9090"

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    depends_on:
      order_db:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    environment:
      ORDER_REST_PORT: :8080
      ORDER_GRPC_PORT: :9091
      PAYMENT_GRPC_ADDRESS: payment-service:9090
      DATABASE_URL: "postgres://order_user:order_password@order_db:5432/orders_db?sslmode=disable"
    ports:
      - "8080:8080"
      - "9091:9091"


  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
volumes:
  order_data:
  payment_data: